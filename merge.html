<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Converter - Merge PDF</title>
    <meta
      name="description"
      content="Merge multiple PDF files into one document quickly and securely."
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260308-16" />
  </head>
  <body class="split-tool-page">
    <div id="vantaBg" class="vanta-bg" aria-hidden="true"></div>
    <div class="rain-scene" aria-hidden="true">
      <div class="city-blur"></div>
      <div class="mist-overlay"></div>
      <canvas id="rainCanvas" class="rain-canvas"></canvas>
      <div class="lens-bloom"></div>
      <div class="glass-noise"></div>
      <div class="film-bars"></div>
    </div>

    <button id="sideToggleBtn" class="side-toggle-btn" type="button" aria-label="Open menu">
      <span class="menu-line"></span>
      <span class="menu-line"></span>
      <span class="menu-dot"></span>
    </button>

    <aside id="sideMenu" class="side-menu" aria-label="Main menu">
      <div class="side-menu-head">
        <a class="side-logo side-logo-only" href="/index.html" aria-label="Go to Nova Converter home">
          <img
            class="side-logo-image"
            src="/assets/logos/nova-logo.png"
            alt="Nova Converter"
            loading="eager"
            decoding="async"
            onerror="const p=this.closest('a'); if(p){p.classList.remove('side-logo-only');} this.remove();"
          />
          <span class="side-logo-orb" aria-hidden="true"></span>
          <span class="side-logo-word">
            <strong>Nova</strong>
            <em>Converter</em>
          </span>
        </a>
        <button id="sideCloseBtn" class="side-close-btn" type="button" aria-label="Close menu">
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="side-nav">
        <a class="side-link" href="/split.html">
          <span class="side-link-icon" aria-hidden="true">
            <i data-lucide="scissors" class="lucide-icon"></i>
          </span>
          <span class="side-link-text">Split PDF</span>
          <span class="side-link-arrow" aria-hidden="true">↗</span>
        </a>
        <a class="side-link active" href="/merge.html">
          <span class="side-link-icon" aria-hidden="true">
            <i data-lucide="layers" class="lucide-icon"></i>
          </span>
          <span class="side-link-text">Merge PDF</span>
          <span class="side-link-arrow" aria-hidden="true">↗</span>
        </a>
      </nav>
      <div class="side-foot">Nova Converter</div>
    </aside>

    <div id="sideBackdrop" class="side-backdrop"></div>

    <div class="container split-page-container">
      <div class="topbar">
        <a class="brand-link brand-logo-only" href="/index.html" aria-label="Go to Nova Converter home">
          <img
            class="brand-logo-image"
            src="/assets/logos/nova-logo.png"
            alt="Nova Converter"
            loading="eager"
            decoding="async"
            onerror="const p=this.closest('a'); if(p){p.classList.remove('brand-logo-only');} this.remove();"
          />
          <span class="brand-icon" aria-hidden="true">N</span>
          <span class="brand-word">
            <strong>Nova</strong>
            <em>Converter</em>
          </span>
        </a>
      </div>

      <section class="hero">
        <h1>Merge PDF</h1>
        <p class="subtitle">Upload multiple PDF files and combine them into one clean document.</p>
      </section>

      <div class="card split-card merge-card">
        <label id="mergeDropzone" class="upload-box split-upload-box" for="mergeFileInput">
          <input id="mergeFileInput" type="file" accept=".pdf,application/pdf" multiple />
          <div class="split-upload-icon" aria-hidden="true">
            <i data-lucide="upload" class="lucide-icon"></i>
          </div>
          <p id="mergeFileInfo">Drag & drop PDFs here or click to upload</p>
          <p class="tick-hint">Select 2 or more PDFs. Max 100MB per file.</p>
        </label>

        <div class="split-meta-grid">
          <div class="split-meta-item">
            <span class="split-meta-label">Files</span>
            <span id="mergeFileCount" class="split-meta-value">0</span>
          </div>
          <div class="split-meta-item">
            <span class="split-meta-label">Total Pages</span>
            <span id="mergePageCount" class="split-meta-value">0</span>
          </div>
        </div>

        <div id="mergeFileList" class="merge-file-list">
          <div class="merge-empty">Upload PDFs to build merge order.</div>
        </div>

        <div id="mergeProcessingWrap" class="split-processing-wrap hidden" aria-live="polite">
          <div class="split-processing-head">
            <div class="split-spinner" aria-hidden="true"></div>
            <span id="mergeProgressLabel">Processing...</span>
          </div>
          <div class="split-progress-track">
            <div id="mergeProgressBar" class="split-progress-bar"></div>
          </div>
          <div id="mergeProgressPercent" class="split-progress-percent">0%</div>
        </div>

        <div class="buttons split-buttons">
          <button id="mergeBtn" class="convert split-main-btn btn-with-icon" type="button" disabled>
            <i data-lucide="layers-3" class="btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Merge PDF</span>
          </button>
          <a id="mergeDownloadLink" class="download btn-with-icon hidden" download>
            <i data-lucide="download" class="btn-icon" aria-hidden="true"></i>
            <span class="btn-text">Download Merged PDF</span>
          </a>
        </div>

        <p id="mergeStatus" class="status">Upload at least 2 PDFs to start.</p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/lucide@0.511.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.halo.min.js"></script>
    <script>
      (() => {
        let vantaEffect = null;
        const target = document.getElementById("vantaBg");

        const shouldUseLiteMode = () =>
          window.matchMedia("(prefers-reduced-motion: reduce)").matches ||
          window.matchMedia("(max-width: 820px)").matches;

        const syncVanta = () => {
          if (!target) return;

          const useLite = shouldUseLiteMode();
          document.body.classList.toggle("vanta-lite", useLite);

          if (useLite) {
            if (vantaEffect) {
              vantaEffect.destroy?.();
              vantaEffect = null;
            }
            return;
          }

          if (!window.VANTA) return;

          if (vantaEffect) {
            vantaEffect.resize?.();
            return;
          }

          vantaEffect = window.VANTA.HALO({
            el: "#vantaBg",
            mouseControls: !window.matchMedia("(hover: none)").matches,
            touchControls: false,
            gyroControls: false,
            minHeight: 200.0,
            minWidth: 200.0,
            scale: 1.0,
            scaleMobile: 1.0,
            size: 2.0,
          });
        };
        window.addEventListener("load", syncVanta, { once: true });
        window.addEventListener("resize", syncVanta, { passive: true });
      })();
    </script>
    <script src="rain-bg.js?v=20260305-43"></script>
    <script src="menu.js?v=20260305-45"></script>
    <script src="merge.js?v=20260308-02"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((registration) => {
              registration.update();
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
