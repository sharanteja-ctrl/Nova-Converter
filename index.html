<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nova Converter</title>
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nova Converter" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icon.svg" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260304-08" />
  </head>
  <body>
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/bg.mp4" type="video/mp4" />
    </video>
    <div class="smoke-stage" aria-hidden="true">
      <span class="smoke smoke-a"></span>
      <span class="smoke smoke-b"></span>
      <span class="smoke smoke-c"></span>
      <span class="smoke smoke-d"></span>
    </div>

    <div class="container">
      <div class="topbar"></div>

      <section class="hero">
        <h1>Nova Converter</h1>
        <p class="subtitle">Fast • Secure • High Quality Compression</p>
      </section>

      <div class="card">
        <div class="success-burst" id="successBurst" aria-hidden="true"></div>
        <label class="upload-box" id="dropzone" for="fileInput">
          <input id="fileInput" type="file" multiple />
          <p id="fileInfo">Drop files here or click to upload (you can select many photos)</p>
        </label>

        <div class="camera-block">
          <button id="openCameraBtn" class="download" type="button">Open Camera</button>
          <div id="cameraPanel" class="camera-panel hidden">
            <video id="cameraPreview" autoplay playsinline muted></video>
            <div class="camera-actions">
              <button id="captureBtn" class="convert" type="button">Capture Photo</button>
              <button id="closeCameraBtn" class="download" type="button">
                Close Camera
              </button>
            </div>
          </div>
        </div>

        <div class="size-section">
          <label for="targetSizeInput">Target Size</label>
          <div class="size-input">
            <input id="targetSizeInput" type="number" value="1" min="1" />
            <select id="targetUnitSelect" aria-label="Target size unit">
              <option>MB</option>
              <option selected>KB</option>
            </select>
          </div>
          <div class="max-compression">
            <label class="tick-toggle">
              <input id="maxCompressionInput" type="checkbox" />
              <span class="tick-box" aria-hidden="true"></span>
              <span class="tick-label">Heavy Compression</span>
            </label>
            <p class="tick-hint">Strong compression without raster blur (keeps text clearer).</p>
          </div>
        </div>

        <div class="buttons">
          <button id="convertBtn" class="convert" disabled>Convert to PDF</button>
          <a id="downloadLink" class="download hidden" download>Download PDF</a>
        </div>

        <div id="previewControls" class="preview-controls hidden">
          <button id="previewBtn" class="download preview-toggle" type="button">Preview PDF</button>
        </div>

        <div id="previewWrap" class="preview-wrap hidden">
          <div class="preview-header">
            <span>PDF Preview</span>
            <button id="previewCloseBtn" class="preview-close" type="button">Close</button>
          </div>
          <iframe id="previewFrame" title="PDF preview"></iframe>
        </div>

        <div id="loadingWrap" class="loading-wrap" aria-live="polite">
          <div class="loading-meta">
            <span id="loadingLabel">Preparing conversion...</span>
            <span id="loadingPercent">0%</span>
          </div>
          <div class="loading-track">
            <div id="loadingBar" class="loading-bar"></div>
            <div id="loadingHead" class="loading-head" aria-hidden="true"></div>
            <div class="loading-end" aria-hidden="true"></div>
          </div>
          <div class="loading-caption">Quality-first compression timeline</div>
        </div>

        <p id="status" class="status" aria-live="polite">Choose a document to start.</p>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js?v=20260304-08"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .then((registration) => {
              registration.update();
            })
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
